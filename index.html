<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 AI-Powered Life OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Three.js canvas ── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #canvas-container canvas { display: block; }

    /* ── Pulse rings ── */
    .pulse-rings {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0, 255, 255, 0.15);
      animation: pulse-ring 3s ease-out infinite;
    }
    .ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
    .ring:nth-child(2) { width: 360px; height: 360px; animation-delay: 0.8s; }
    .ring:nth-child(3) { width: 520px; height: 520px; animation-delay: 1.6s; }
    .ring:nth-child(4) { width: 680px; height: 680px; animation-delay: 2.4s; }
    @keyframes pulse-ring {
      0%   { transform: scale(0.6); opacity: 0.7; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      width: 100%;
      max-width: 1100px;
    }

    /* ── Title ── */
    .title {
      font-size: clamp(2rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
      background: linear-gradient(90deg, #00f5ff, #a855f7, #ff1cf7, #00f5ff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 4s linear infinite;
      filter: drop-shadow(0 0 24px rgba(168,85,247,0.5));
      margin-bottom: 16px;
    }
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-bottom: 64px;
      letter-spacing: 1px;
    }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 32px var(--glow);
      border-color: var(--glow);
    }
    .card:nth-child(1) { --glow: rgba(0,245,255,0.4); }
    .card:nth-child(2) { --glow: rgba(168,85,247,0.4); }
    .card:nth-child(3) { --glow: rgba(255,28,247,0.4); }
    .card:nth-child(4) { --glow: rgba(0,245,255,0.4); }

    .card-icon { font-size: 2rem; margin-bottom: 10px; }

    .card-value {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(135deg, #00f5ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* ── Nav links ── */
    .nav {
      margin-top: 48px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav a {
      text-decoration: none;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .nav a:hover {
      background: rgba(0,245,255,0.12);
      border-color: rgba(0,245,255,0.5);
      color: #00f5ff;
    }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr 1fr; }
    }

    /* ── Settings button ── */
    .settings-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      color: #fff;
    }
    .settings-btn:hover {
      background: rgba(0,245,255,0.15);
      border-color: rgba(0,245,255,0.5);
      transform: rotate(60deg);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Modal card ── */
    .modal {
      background: #1a1a2e;
      border: 1px solid rgba(0,245,255,0.25);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(30px);
      transition: transform 0.3s;
      box-shadow: 0 0 40px rgba(0,245,255,0.12), 0 0 80px rgba(168,85,247,0.08);
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }
    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #00f5ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .modal-close:hover { background: rgba(255,100,100,0.2); color: #fff; }

    /* ── Form fields ── */
    .field-group {
      margin-bottom: 16px;
    }
    .field-group label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .field-group input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      color: #e6edf3;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: rgba(0,245,255,0.5); }
    .field-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(168,85,247,0.8);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 20px 0 10px;
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Modal action buttons ── */
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(168,85,247,0.2));
      border: 1px solid rgba(0,245,255,0.4);
      border-radius: 10px;
      color: #e6edf3;
      padding: 11px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: linear-gradient(135deg, rgba(0,245,255,0.3), rgba(168,85,247,0.3)); }
    .btn-reset {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: rgba(255,255,255,0.6);
      padding: 11px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(255,100,100,0.1); border-color: rgba(255,100,100,0.3); color: #fff; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 88px;
      right: 24px;
      z-index: 300;
      background: rgba(0,245,255,0.15);
      border: 1px solid rgba(0,245,255,0.4);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.88rem;
      color: #e6edf3;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <!-- Three.js scene -->
  <div id="canvas-container"></div>

  <!-- Pulse rings -->
  <div class="pulse-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="title">🧠 AI-Powered Life OS</h1>
    <p class="subtitle">Track · Optimize · Evolve — Your intelligent life dashboard</p>

    <div class="cards">
      <div class="card">
        <div class="card-icon">🎯</div>
        <div class="card-value" data-target="12" id="stat-goals">0</div>
        <div class="card-label">Active Goals</div>
      </div>
      <div class="card">
        <div class="card-icon">🔥</div>
        <div class="card-value" data-target="45" id="stat-streak">0</div>
        <div class="card-label">Day Streak</div>
      </div>
      <div class="card">
        <div class="card-icon">⭐</div>
        <div class="card-value" data-target="87" id="stat-score">0</div>
        <div class="card-label">Life Score</div>
      </div>
      <div class="card">
        <div class="card-icon">🤖</div>
        <div class="card-value" data-target="50" id="stat-ai">0</div>
        <div class="card-label">AI Prompts</div>
      </div>
    </div>

    <nav class="nav">
      <a href="progress.html">📊 Progress Dashboard</a>
      <a href="timer.html">⏱ Pomodoro Timer</a>
    </nav>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Settings button -->
  <button class="settings-btn" id="settings-btn" title="Settings">⚙️</button>

  <!-- Settings modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <button class="modal-close" id="modal-close" title="Close">✕</button>
      <h2>⚙️ Widget Settings</h2>

      <div class="field-group">
        <label for="cfg-title">Title Text</label>
        <input id="cfg-title" type="text" placeholder="AI-Powered Life OS" />
      </div>
      <div class="field-group">
        <label for="cfg-subtitle">Subtitle Text</label>
        <input id="cfg-subtitle" type="text" placeholder="Track · Optimize · Evolve…" />
      </div>

      <div class="field-section-title">Stat Cards</div>

      <div class="field-row">
        <div class="field-group">
          <label for="cfg-goals-label">Card 1 Label</label>
          <input id="cfg-goals-label" type="text" placeholder="Active Goals" />
        </div>
        <div class="field-group">
          <label for="cfg-goals-value">Card 1 Value</label>
          <input id="cfg-goals-value" type="number" min="0" placeholder="12" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="cfg-streak-label">Card 2 Label</label>
          <input id="cfg-streak-label" type="text" placeholder="Day Streak" />
        </div>
        <div class="field-group">
          <label for="cfg-streak-value">Card 2 Value</label>
          <input id="cfg-streak-value" type="number" min="0" placeholder="45" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="cfg-score-label">Card 3 Label</label>
          <input id="cfg-score-label" type="text" placeholder="Life Score" />
        </div>
        <div class="field-group">
          <label for="cfg-score-value">Card 3 Value</label>
          <input id="cfg-score-value" type="number" min="0" placeholder="87" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="cfg-ai-label">Card 4 Label</label>
          <input id="cfg-ai-label" type="text" placeholder="AI Prompts" />
        </div>
        <div class="field-group">
          <label for="cfg-ai-value">Card 4 Value</label>
          <input id="cfg-ai-value" type="number" min="0" placeholder="50" />
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-save" id="btn-save">💾 Save</button>
        <button class="btn-reset" id="btn-reset-defaults">🔄 Reset to Default</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <script>
    /* ───────────── Three.js Scene ───────────── */
    (function () {
      const container = document.getElementById('canvas-container');
      const W = window.innerWidth, H = window.innerHeight;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 1000);
      camera.position.z = 5;

      /* Wireframe icosahedra (brain-like cluster) */
      const icoGeo = new THREE.IcosahedronGeometry(1, 1);
      const configs = [
        { scale: 1.4, color: 0x00f5ff, x: 0,    y: 0,    z: 0 },
        { scale: 0.8, color: 0xa855f7, x: 2.2,  y: 0.8,  z: -1 },
        { scale: 0.7, color: 0xff1cf7, x: -2.2, y: -0.6, z: -0.5 },
        { scale: 0.6, color: 0x00f5ff, x: 1.2,  y: -1.5, z: 0.5 },
        { scale: 0.5, color: 0xa855f7, x: -1.3, y: 1.4,  z: 0.3 },
      ];

      const meshes = configs.map(c => {
        const mat = new THREE.MeshBasicMaterial({ color: c.color, wireframe: true });
        const mesh = new THREE.Mesh(icoGeo, mat);
        mesh.scale.setScalar(c.scale);
        mesh.position.set(c.x, c.y, c.z);
        scene.add(mesh);
        return mesh;
      });

      /* Particle system */
      const particleCount = 300;
      const positions = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 20;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
      }
      const pGeo = new THREE.BufferGeometry();
      pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const pMat = new THREE.PointsMaterial({ color: 0x334155, size: 0.06 });
      scene.add(new THREE.Points(pGeo, pMat));

      /* Mouse tracking */
      let mx = 0, my = 0;
      document.addEventListener('mousemove', e => {
        mx = (e.clientX / window.innerWidth  - 0.5) * 2;
        my = (e.clientY / window.innerHeight - 0.5) * 2;
      });

      /* Animation loop */
      let t = 0;
      function animate() {
        requestAnimationFrame(animate);
        t += 0.005;
        meshes.forEach((m, i) => {
          m.rotation.x += 0.003 + i * 0.001;
          m.rotation.y += 0.005 + i * 0.001;
        });
        camera.position.x += (mx * 1.5 - camera.position.x) * 0.04;
        camera.position.y += (-my * 1.0 - camera.position.y) * 0.04;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
      }
      animate();

      /* Resize */
      window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
    })();

    /* ───────────── Animated Counters ───────────── */
    function animateCounter(el, target) {
      const duration = 1400;
      const start = performance.now();
      function step(now) {
        const elapsed = Math.min(now - start, duration);
        const progress = elapsed / duration;
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(ease * target);
        if (elapsed < duration) requestAnimationFrame(step);
        else el.textContent = target;
      }
      requestAnimationFrame(step);
    }

    /* ───────────── Settings / localStorage ───────────── */
    const DEFAULTS = {
      title:        'AI-Powered Life OS',
      subtitle:     'Track · Optimize · Evolve — Your intelligent life dashboard',
      goalsLabel:   'Active Goals',
      goalsValue:   12,
      streakLabel:  'Day Streak',
      streakValue:  45,
      scoreLabel:   'Life Score',
      scoreValue:   87,
      aiLabel:      'AI Prompts',
      aiValue:      50,
    };

    function loadSettings() {
      const s = {};
      for (const [k, def] of Object.entries(DEFAULTS)) {
        const stored = localStorage.getItem('lifeos_' + k);
        s[k] = stored !== null ? (typeof def === 'number' ? Number(stored) : stored) : def;
      }
      return s;
    }

    function applySettings(s) {
      document.querySelector('.title').textContent   = '🧠 ' + s.title;
      document.querySelector('.subtitle').textContent = s.subtitle;

      const cards = [
        { labelEl: document.querySelectorAll('.card-label')[0], valueEl: document.getElementById('stat-goals'),  label: s.goalsLabel,  value: s.goalsValue },
        { labelEl: document.querySelectorAll('.card-label')[1], valueEl: document.getElementById('stat-streak'), label: s.streakLabel, value: s.streakValue },
        { labelEl: document.querySelectorAll('.card-label')[2], valueEl: document.getElementById('stat-score'),  label: s.scoreLabel,  value: s.scoreValue },
        { labelEl: document.querySelectorAll('.card-label')[3], valueEl: document.getElementById('stat-ai'),     label: s.aiLabel,     value: s.aiValue },
      ];
      cards.forEach(({ labelEl, valueEl, label, value }, i) => {
        labelEl.textContent = label;
        valueEl.dataset.target = value;
        setTimeout(() => animateCounter(valueEl, value), i * 150);
      });
    }

    function populateForm(s) {
      document.getElementById('cfg-title').value        = s.title;
      document.getElementById('cfg-subtitle').value     = s.subtitle;
      document.getElementById('cfg-goals-label').value  = s.goalsLabel;
      document.getElementById('cfg-goals-value').value  = s.goalsValue;
      document.getElementById('cfg-streak-label').value = s.streakLabel;
      document.getElementById('cfg-streak-value').value = s.streakValue;
      document.getElementById('cfg-score-label').value  = s.scoreLabel;
      document.getElementById('cfg-score-value').value  = s.scoreValue;
      document.getElementById('cfg-ai-label').value     = s.aiLabel;
      document.getElementById('cfg-ai-value').value     = s.aiValue;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    /* ── Modal open/close ── */
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('settings-btn').addEventListener('click', () => {
      populateForm(loadSettings());
      overlay.classList.add('open');
    });
    function closeModal() { overlay.classList.remove('open'); }
    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ── Save ── */
    document.getElementById('btn-save').addEventListener('click', () => {
      function parseNum(val, def) {
        const n = parseInt(val, 10);
        return isNaN(n) ? def : Math.max(0, n);
      }
      const s = {
        title:       document.getElementById('cfg-title').value.trim()        || DEFAULTS.title,
        subtitle:    document.getElementById('cfg-subtitle').value.trim()     || DEFAULTS.subtitle,
        goalsLabel:  document.getElementById('cfg-goals-label').value.trim()  || DEFAULTS.goalsLabel,
        goalsValue:  parseNum(document.getElementById('cfg-goals-value').value,  DEFAULTS.goalsValue),
        streakLabel: document.getElementById('cfg-streak-label').value.trim() || DEFAULTS.streakLabel,
        streakValue: parseNum(document.getElementById('cfg-streak-value').value, DEFAULTS.streakValue),
        scoreLabel:  document.getElementById('cfg-score-label').value.trim()  || DEFAULTS.scoreLabel,
        scoreValue:  parseNum(document.getElementById('cfg-score-value').value,  DEFAULTS.scoreValue),
        aiLabel:     document.getElementById('cfg-ai-label').value.trim()     || DEFAULTS.aiLabel,
        aiValue:     parseNum(document.getElementById('cfg-ai-value').value,     DEFAULTS.aiValue),
      };
      for (const [k, v] of Object.entries(s)) localStorage.setItem('lifeos_' + k, v);
      applySettings(s);
      closeModal();
      showToast('✅ Saved!');
    });

    /* ── Reset to defaults ── */
    document.getElementById('btn-reset-defaults').addEventListener('click', () => {
      for (const k of Object.keys(DEFAULTS)) localStorage.removeItem('lifeos_' + k);
      applySettings(DEFAULTS);
      closeModal();
      showToast('🔄 Reset to defaults');
    });

    /* ── Init on page load ── */
    applySettings(loadSettings());
  </script>
</body>
</html>
